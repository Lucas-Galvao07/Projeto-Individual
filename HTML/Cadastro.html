<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/Login-Cadastro-style.css">
    <title>Cadastrar</title>
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <div class="nav-logo">GOH</div>
            <div class="nav-links">
                <a href="index.html#Inicio" class="nav-ativo">Home</a>
                <a href="index.html#Sobre">Sobre</a>
                <a href="Login.html" class="nav-login">Entrar</a>
                <a href="Cadastro.html" class="nav-cadastro">Cadastrar</a>
                <a href="Personagens.html" class="nav-logado">Personagens</a>
                <a href="Dashboard.html" class="nav-logado">Dashboard</a>
            </div>
        </div>
    </nav>

    <div id="div_cadastro" class="box">

        <div class="esquerda-cadastro"></div>

        <div class="direita">
            <h1>Cadastro</h1>

            <div class="input_box">
                <span>Nome</span>
                <input type="text" id="val_nome" placeholder="Ex: Jin Mori">
            </div>

            <div class="input_box">
                <span>Email</span>
                <input type="text" id="val_email" placeholder="seuemail@gmail.com">
            </div>

            <div class="input_box">
                <span>Senha</span>
                <input type="password" id="val_senha" placeholder="••••••••">
            </div>

            <div class="input_box">
                <span>Confirmar senha</span>
                <input type="password" id="val_confirmar" placeholder="••••••••">
            </div>

            <button onclick="cadastrar()">Cadastrar</button>

            <div id="mensagem" class="mensagem"></div>
        </div>

    </div>
</body>

<script>
    function cadastrar() {
        let nome = val_nome.value.trim()
        let email = val_email.value.trim()
        let senha = val_senha.value.trim()
        let confirmar = val_confirmar.value.trim()
        let erros = false

        if (nome == "" || email == "" || senha == "" || confirmar == "") {
            alert("Preencha todos os campos")
            erros = true
        }

        if (nome.length < 3) {
            alert("Nome muito curto")
        }

        if (!email.includes("@") || !email.includes(".")) {
            alert("Email inválido")
            erros = true
        }

        if (senha.length < 6) {
            alert("Senha deve ter no mínimo 6 caracteres")
            erros = true
        }

        if (senha != confirmar) {
            alert("Senhas não coincidem")
            erros = true
        }

        if (erros == false) {
            alert("Cadastro realizado")
        }
    }
</script>

</html>
