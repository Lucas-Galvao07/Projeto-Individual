<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/Login-Cadastro-style.css">
    <title>Login</title>
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <div class="nav-logo">GOH</div>
            <div class="nav-links">
                <a href="index.html#Inicio" class="nav-ativo">Home</a>
                <a href="index.html#Sobre">Sobre</a>
                <a href="Login.html" class="nav-login">Entrar</a>
                <a href="Cadastro.html" class="nav-cadastro">Cadastrar</a>
                <a href="Personagens.html" class="nav-logado">Personagens</a>
                <a href="Dashboard.html" class="nav-logado">Dashboard</a>
            </div>
        </div>
    </nav>

    <div id="div_cadastro" class="box">

        <div class="esquerda-login"></div>

        <div class="direita">
            <h1>Login</h1>

            <div class="input_box">
                <span>Email</span>
                <input type="text" id="val_email" placeholder="seuemail@gmail.com">
            </div>

            <div class="input_box">
                <span>Senha</span>
                <input type="password" id="val_senha" placeholder="••••••••">
            </div>

            <button onclick="logar()">Logar</button>
        </div>

    </div>
</body>

<script>
    function logar() {
        let email = val_email.value.trim()
        let senha = val_senha.value.trim()
        let erros = false

        if (email == "" || senha == "") {
            alert("Preencha todos os campos")
            erros = true
        }

        if (!email.includes("@") || !email.includes(".")) {
            alert("Email inválido")
            erros = true
        }

        if (senha.length < 6) {
            alert("Senha muito curta (mín 6)")
            erros = true
        }

        if (erros == false) {
            alert("Login OK")
        }
    }
</script>

</html>
