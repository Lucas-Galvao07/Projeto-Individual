<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/Login-Cadastro-style.css">
    <title>Cadastrar</title>
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <div class="nav-logo">GOH</div>
            <div class="nav-links">
                <a href="index.html#Inicio" class="nav-ativo">Home</a>
                <a href="index.html#Sobre">Sobre</a>
                <a href="Login.html" class="nav-login">Entrar</a>
                <a href="Cadastro.html" class="nav-cadastro">Cadastrar</a>
                <a href="Personagens.html" class="nav-logado">Personagens</a>
                <a href="Dashboard.html" class="nav-logado">Dashboard</a>
            </div>
        </div>
    </nav>

    <div id="div_cadastro" class="box">

        <div class="esquerda-cadastro"></div>

        <div class="direita">
            <h1>Cadastro</h1>

            <div class="input_box">
                <span>Nome</span>
                <input type="text" id="nome_input" placeholder="Ex: Jin Mori">
            </div>

            <div class="input_box">
                <span>Email</span>
                <input type="text" id="email_input" placeholder="seuemail@gmail.com">
            </div>

            <div class="input_box">
                <span>Senha</span>
                <input type="password" id="senha_input" placeholder="••••••••">
            </div>

            <div class="input_box">
                <span>Confirmar senha</span>
                <input type="password" id="confirmacao_senha_input" placeholder="••••••••">
            </div>

            <button onclick="cadastrar()">Cadastrar</button>

            <div id="mensagem" class="mensagem"></div>
        </div>

    </div>
</body>

<script>

  // Array para armazenar empresas cadastradas para validação de código de ativação 
  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      // cardErro.style.display = "block";
      // mensagem_erro.innerHTML =
      //   "(Mensagem de erro para todos os campos em branco)";

      // finalizarAguardar();
      return false;
    } 
    // else {
    //   setInterval(sumirMensagem, 5000);
    // }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          // finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  // function sumirMensagem() {
  //   cardErro.style.display = "none";
  // }
</script>

</html>
